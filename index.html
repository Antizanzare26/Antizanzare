<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ANTIZANZARE PRO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f3;
            --white: #ffffff;
            --shadow-light: -8px -8px 15px rgba(255,255,255,1);
            --shadow-dark: 8px 8px 15px rgba(0,0,0,0.1);
            --red: #ff3b30;
            --green: #34c759;
            --orange: #ff9500;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #1c1c1e;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            box-sizing: border-box;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5px;
        }
        .header h1 { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -1px; }

        /* Card Stato Neumorfica */
        .status-card {
            background: var(--bg);
            padding: 20px;
            border-radius: 25px;
            box-shadow: var(--shadow-light), var(--shadow-dark);
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .dot { width: 12px; height: 12px; background: var(--red); border-radius: 50%; margin-right: 15px; }
        .dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); }

        /* Area Comandi - Spaziatura Uniforme */
        .controls-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribuisce i blocchi verticalmente */
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 0.8; /* I due tasti occupano la maggior parte dello spazio */
        }

        /* Tasti Neumorfici */
        .tile {
            background: var(--bg);
            border-radius: 30px;
            border: 2px solid transparent;
            box-shadow: var(--shadow-light), var(--shadow-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tile:active { box-shadow: inset 5px 5px 10px rgba(0,0,0,0.1), inset -5px -5px 10px #fff; transform: scale(0.98); }
        
        /* Stile Attivo (Arancione con bordo verde come da foto) */
        .tile.active {
            background: var(--orange);
            border-color: var(--green);
            color: white;
        }

        .tile svg { width: 70px; height: 70px; margin-bottom: 15px; }
        .tile span { font-weight: 700; font-size: 16px; }

        /* Tasto Stop Emergenza */
        .stop-btn {
            background: var(--red);
            height: 80px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            border: none;
            box-shadow: 0 10px 20px rgba(255,59,48,0.3);
            margin-top: 20px;
        }

        /* Bottom Nav */
        .nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .nav-item { text-align: center; color: #8e8e93; font-weight: 700; font-size: 11px; }
        .nav-item.active { color: #1c1c1e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ANTIZANZARE</h1>
        <div id="clock" style="font-weight: 700; color: #8e8e93;">15:35</div>
    </div>

    <div class="status-card">
        <div id="status-dot" class="dot"></div>
        <div style="flex: 1;">
            <div id="status-text" style="font-weight: 800; font-size: 18px;">Disconnesso</div>
            <div style="font-size: 13px; color: #8e8e93;">Cloud HiveMQ</div>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-dark);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </div>
    </div>

    <div class="section-label">Controllo Manuale</div>

    <div class="controls-area">
        <div class="grid">
            <div id="btn-rep" class="tile" onclick="sendCmd('START_REP')">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="#ff3b30" stroke-width="2.5"/>
                    <line x1="5" y1="19" x2="19" y2="5" stroke="#ff3b30" stroke-width="2.5"/>
                    <path d="M8 12h8M12 9v6" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Repellente</span>
            </div>

            <div id="btn-ins" class="tile" onclick="sendCmd('START_INS')">
                <svg viewBox="0 0 24 24" fill="#000">
                    <path d="M12 2C8.68 2 6 4.68 6 8c0 2.42 1.44 4.49 3.5 5.4V16c0 .55.45 1 1 1h3c.55 0 1-.45 1-1v-2.6c2.06-.91 3.5-2.98 3.5-5.4 0-3.32-2.68-6-6-6zm-2.5 7a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0zm5 0a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/>
                    <path d="M4 21l3-3M20 21l-3-3M4 14l3 3M20 14l-3 3" stroke="#000" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Insetticida</span>
            </div>
        </div>

        <button class="stop-btn" onclick="sendCmd('STOP')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="margin-right:10px;"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6m0-6l-6 6"/></svg>
            DISATTIVA SISTEMA
        </button>
    </div>

    <div class="nav">
        <div class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <div>HOME</div>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <div>TIMER</div>
        </div>
    </div>

    <script>
        // Logica MQTT mantenuta intatta
        const client = mqtt.connect('wss://970da8e9d08943a6a85210f5ad0c0a35.s1.eu.hivemq.cloud:8884/mqtt', {
            clientId: 'PWA_' + Math.random().toString(16).substr(2, 4),
            username: 'Antizanzare', password: 'Antizanzare26!'
        });

        client.on('connect', () => {
            document.getElementById('status-dot').classList.add('online');
            document.getElementById('status-text').innerText = "Sistema Online";
            client.subscribe('antizanzare/stato');
        });

        client.on('message', (topic, message) => {
            const msg = message.toString();
            const btnRep = document.getElementById('btn-rep');
            const btnIns = document.getElementById('btn-ins');
            
            btnRep.classList.remove('active');
            btnIns.classList.remove('active');

            if(msg.includes("RUNNING_REP")) btnRep.classList.add('active');
            if(msg.includes("RUNNING_INS")) btnIns.classList.add('active');
        });

        function sendCmd(c) { client.publish('antizanzare/comandi', c); }

        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
