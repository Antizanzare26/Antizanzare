<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ANTIZANZARE PRO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        :root {
            --bg: #f0f0f3;
            --white: #ffffff;
            --shadow-light: -8px -8px 15px rgba(255,255,255,1);
            --shadow-dark: 8px 8px 15px rgba(0,0,0,0.1);
            --red: #ff3b30;
            --green: #34c759;
            --orange: #ff9500;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #1c1c1e;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5px;
        }
        .header h1 { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -1px; }

        .status-card {
            background: var(--bg);
            padding: 20px;
            border-radius: 25px;
            box-shadow: var(--shadow-light), var(--shadow-dark);
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .dot { width: 12px; height: 12px; background: var(--red); border-radius: 50%; margin-right: 15px; }
        .dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .controls-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 0.8;
        }

        .tile {
            background: var(--bg);
            border-radius: 30px;
            border: 2px solid transparent;
            box-shadow: var(--shadow-light), var(--shadow-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        /* Icone grandi e nitide */
        .tile i { font-size: 65px; margin-bottom: 15px; transition: color 0.2s; }

        .tile:active { 
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.1), inset -5px -5px 10px #fff; 
            transform: scale(0.96); 
        }
        
        .tile.active {
            background: var(--green);
            border-color: var(--green);
            color: white;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.15);
        }

        .tile span { font-weight: 700; font-size: 16px; }

        .stop-btn {
            background: var(--red);
            height: 80px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            border: none;
            box-shadow: 0 10px 20px rgba(255,59,48,0.3);
            margin-top: 20px;
        }

        .nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .nav-item { text-align: center; color: #8e8e93; font-weight: 700; font-size: 11px; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #1c1c1e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ANTIZANZARE</h1>
        <div id="clock" style="font-weight: 700; color: #8e8e93;">15:35</div>
    </div>

    <div class="status-card">
        <div id="status-dot" class="dot"></div>
        <div style="flex: 1;">
            <div id="status-text" style="font-weight: 800; font-size: 18px;">Disconnesso</div>
            <div style="font-size: 13px; color: #8e8e93;">Cloud HiveMQ</div>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-dark);">
            <i class="bi bi-power" style="color: #ff3b30; font-size: 20px;"></i>
        </div>
    </div>

    <div class="section-label">Controllo Manuale</div>

    <div class="controls-area">
        <div class="grid">
            <div id="btn-rep" class="tile" onclick="sendCmd('START_REP')">
                <i class="bi bi-leaf"></i>
                <span>Repellente</span>
            </div>

            <div id="btn-ins" class="tile" onclick="sendCmd('START_INS')">
                <i class="bi bi-skull"></i>
                <span>Insetticida</span>
            </div>
        </div>

        <button class="stop-btn" onclick="sendCmd('STOP')">
            <i class="bi bi-stop-circle-fill" style="margin-right: 12px; font-size: 24px;"></i>
            STOP EMERGENZA
        </button>
    </div>

    <div class="nav">
        <div class="nav-item active">
            <i class="bi bi-house-door-fill"></i>
            <div>HOME</div>
        </div>
        <div class="nav-item">
            <i class="bi bi-clock-history"></i>
            <div>TIMER</div>
        </div>
    </div>

    <script>
        const client = mqtt.connect('wss://970da8e9d08943a6a85210f5ad0c0a35.s1.eu.hivemq.cloud:8884/mqtt', {
            clientId: 'PWA_' + Math.random().toString(16).substr(2, 4),
            username: 'Antizanzare', password: 'Antizanzare26!'
        });

        client.on('connect', () => {
            document.getElementById('status-dot').classList.add('online');
            document.getElementById('status-text').innerText = "Sistema Online";
            client.subscribe('antizanzare/stato');
        });

        client.on('message', (topic, message) => {
            const msg = message.toString();
            const btnRep = document.getElementById('btn-rep');
            const btnIns = document.getElementById('btn-ins');
            
            btnRep.classList.remove('active');
            btnIns.classList.remove('active');

            if(msg.includes("RUNNING_REP")) btnRep.classList.add('active');
            if(msg.includes("RUNNING_INS")) btnIns.classList.add('active');
        });

        function sendCmd(c) { if(client.connected) client.publish('antizanzare/comandi', c); }

        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
