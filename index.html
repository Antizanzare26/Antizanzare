<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ANTIZANZARE Remote</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f0f0f3">
    <link rel="apple-touch-icon" href="icon-1.png">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-neumorphic: #f0f0f3;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --color-green: #34c759;
            --color-red: #ff3b30;
            --color-stop: #990000;
            --shadow-out: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --shadow-in: inset 8px 8px 16px #d1d1d6, inset -8px -8px 16px #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-neumorphic); 
            margin: 0; 
            padding-top: env(safe-area-inset-top); 
            user-select: none; 
            color: var(--text-primary);
        }

        .topbar, .bottomnav { 
            background: rgba(240, 240, 243, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            position: fixed; 
            width: 100%; 
            z-index: 100; 
            box-sizing: border-box;
            border-bottom: 0.5px solid rgba(0,0,0,0.05); 
        }

        .topbar { 
            top: 0; 
            padding: 65px 25px 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .bottomnav { 
            bottom: 0; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px); 
            padding-top: 15px; 
            display: flex; 
            border-top: 0.5px solid rgba(0,0,0,0.05); 
        }

        .tab-content { display: none; padding: 160px 25px 160px 25px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-header { font-weight: 700; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 25px; padding-left: 5px; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            justify-items: center; 
            margin: 0 auto; 
            width: 100%; 
            height: auto; 
            justify-content: center; 
            margin-bottom: 25px; 
        }
        
        .tile { 
            background: var(--bg-neumorphic); 
            border-radius: 30px; 
            padding: 25px; 
            box-shadow: var(--shadow-out); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.4); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            cursor: pointer; 
            width: 100%; 
            height: auto; 
            box-sizing: border-box; 
            justify-content: space-between; 
        }
        .tile:active { transform: scale(0.92); box-shadow: var(--shadow-in); }
        .tile-icon { width: 80px; height: 80px; margin-bottom: 20px; }
        .tile-label { font-weight: 700; font-size: 16px; color: var(--text-primary); }

        .tile-active { background: var(--color-green) !important; color: white !important; border-color: rgba(52,199,89,0.3) !important; }
        .tile-active .tile-label { color: white !important; }

        .tile-stop { 
            grid-column: span 2; 
            background: var(--color-red); 
            color: white; 
            flex-direction: row; 
            justify-content: center; 
            align-items: center; 
            height: 70px; 
            border: none; 
            box-shadow: var(--shadow-out), 0 10px 20px rgba(255,59,48,0.3); 
            margin-top: -5px; 
            margin-bottom: 30px; 
        }
        .tile-stop:active { transform: scale(0.95); box-shadow: var(--shadow-in); }
        .tile-stop .tile-label { color: white; margin-left: 15px; font-size: 17px; font-weight: 800; }

        .status-card { background: var(--bg-neumorphic); border-radius: 28px; padding: 22px; box-shadow: var(--shadow-out); margin-bottom: 40px; display: flex; align-items: center; gap: 15px; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--color-red); }
        .status-text { flex-grow: 1; }
        .status-title { font-weight: 800; font-size: 19px; letter-spacing: -0.4px; }
        .status-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        #btn-power { border: none; background: var(--bg-neumorphic); box-shadow: var(--shadow-out); border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btn-power:active { box-shadow: var(--shadow-in); transform: scale(0.95); }

        .timer-tile { background: var(--bg-neumorphic); border-radius: 22px; padding: 20px 25px; box-shadow: var(--shadow-out); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5); }
        
        .ios-switch { appearance: none; width: 51px; height: 31px; background: #bdbdbd; border-radius: 100px; position: relative; cursor: pointer; transition: 0.3s; }
        .ios-switch:checked { background: var(--color-green); }
        .ios-switch::before { content: ''; position: absolute; width: 27px; height: 27px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .ios-switch:checked::before { transform: translateX(20px); }

        .navbtn { flex: 1; text-align: center; color: #a0a0a0; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .navbtn.active { color: var(--text-primary); }
        .nav-icon { width: 26px; height: 26px; margin-bottom: 4px; }
        .navtext { font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="font-weight:900; font-size:26px; letter-spacing:-0.8px;">ANTIZANZARE</div>
    <div style="font-size: 15px; font-weight: 700; color: var(--text-secondary);" id="time-now">00:00</div>
</div>

<div id="home" class="tab-content active">
    <div class="status-card">
        <div id="conn-dot" class="status-indicator"></div>
        <div class="status-text">
            <div id="conn-status-title" class="status-title">Disconnesso</div>
            <div id="conn-status-desc" class="status-desc">In attesa dell'ESP32...</div>
        </div>
        <button id="btn-power" onclick="toggleAllTimers()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </button>
    </div>

    <div class="section-header">Controllo Manuale</div>
    
    <div class="grid-container">
        <button id="tile-rep" class="tile" onclick="sendCmd('START_REP')">
            <svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13c-1.5-1-4-1.5-6-1.5l-6-2" stroke-width="2"/> 
                <path d="M12 11.5c1-3 3-5 5-5s2 2 1 5" fill="rgba(52,199,89,0.2)"/>
                <path d="M10 11.5c0-2.5 1.5-4.5 3-4.5s2 1.5 1.5 4" fill="rgba(52,199,89,0.1)"/>
                <path d="M9 12l-2 3M12 12l-1 4M15 12.5l1 3"/>
                <circle cx="13" cy="11.5" r="0.5" fill="#34c759"/>
            </svg>
            <div class="tile-label">Repellente</div>
        </button>

        <button id="tile-ins" class="tile" onclick="sendCmd('START_INS')">
            <svg class="tile-icon" viewBox="0 0 24 24" fill="#1c1c1e">
                <path d="M12 3c-4.4 0-8 3.1-8 7 0 1.6.6 3.1 1.7 4.3.3.3.5.7.4 1.1l-.4 2.1c-.1.5.3 1 .8 1h11c.5 0 .9-.5.8-1l-.4-2.1c-.1-.4.1-.8.4-1.1 1.1-1.2 1.7-2.7 1.7-4.3 0-3.9-3.6-7-8-7z"/>
                <circle cx="9" cy="10.5" r="2.2" fill="var(--bg-neumorphic)"/>
                <circle cx="15" cy="10.5" r="2.2" fill="var(--bg-neumorphic)"/>
                <path d="M12 12.5l-1 1.5h2z" fill="var(--bg-neumorphic)"/>
                <rect x="9.5" y="16" width="1" height="2" rx="0.5" fill="var(--bg-neumorphic)"/>
                <rect x="11.5" y="16" width="1" height="2" rx="0.5" fill="var(--bg-neumorphic)"/>
                <rect x="13.5" y="16" width="1" height="2" rx="0.5" fill="var(--bg-neumorphic)"/>
            </svg>
            <div class="tile-label">Insetticida</div>
        </button>
    </div>

    <button class="tile tile-stop" onclick="sendCmd('STOP')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
            <circle cx="12" cy="12" r="9"/>
            <path d="M9 9l6 6m0-6l-6 6"/>
        </svg>
        <div class="tile-label">STOP EMERGENZA</div>
    </button>

</div>

<div id="timer" class="tab-content">
    <div class="section-header">Programmazione</div>
    <div id="timer-container" class="timer-list">
        <p style="text-align:center; color:#999; font-size:14px; margin-top:20px;">Caricamento timer...</p>
    </div>
</div>

<div class="bottomnav">
    <div class="navbtn active" id="b1" onclick="showTab('home','b1')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="navtext">HOME</span>
    </div>
    <div class="navbtn" id="b2" onclick="showTab('timer','b2')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="navtext">TIMER</span>
    </div>
</div>

<script>
    const mqtt_url = 'wss://970da8e9d08943a6a85210f5ad0c0a35.s1.eu.hivemq.cloud:8884/mqtt';
    const client = mqtt.connect(mqtt_url, { 
        clientId: 'PWA_' + Math.random().toString(16).substr(2, 4), 
        username: 'Antizanzare', password: 'Antizanzare26!' 
    });

    let allTimersActive = true;

    client.on('connect', () => {
        document.getElementById('conn-dot').style.background = "var(--color-green)";
        document.getElementById('conn-status-title').innerText = "Sistema Online";
        document.getElementById('conn-status-desc').innerText = "Connesso al Cloud HiveMQ";
        client.subscribe(['antizanzare/stato', 'antizanzare/timer_status']);
    });

    client.on('message', (topic, message) => {
        const msg = message.toString();
        if (topic === 'antizanzare/stato') {
            const desc = document.getElementById('conn-status-desc');
            const tR = document.getElementById('tile-rep'), tI = document.getElementById('tile-ins');
            tR.classList.remove('tile-active'); tI.classList.remove('tile-active');
            
            if (msg === "IDLE") desc.innerText = "In attesa di comando";
            else {
                desc.innerText = "Attivo: " + msg;
                if (msg.includes("RUNNING_REP")) tR.classList.add('tile-active');
                if (msg.includes("RUNNING_INS")) tI.classList.add('tile-active');
            }
        }
        if (topic === 'antizanzare/timer_status') updateTimerList(msg);
    });

    function updateTimerList(payload) {
        const container = document.getElementById('timer-container');
        container.innerHTML = "";
        if (payload === "EMPTY") {
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">Nessun timer configurato</p>';
            return;
        }
        const timers = payload.split(',');
        timers.forEach((t, index) => {
            const parts = t.split(':');
            if (parts.length < 4) return;
            const tipo = parts[0] === 'R' ? 'Repellente' : 'Insetticida';
            const orario = parts[1] + ":" + parts[2];
            const attivo = parts[3] === "ON";
            const accent = parts[0] === 'R' ? 'var(--color-green)' : 'var(--color-red)';

            container.insertAdjacentHTML('beforeend', `
                <div class="timer-tile">
                    <div style="display:flex; align-items:center;">
                        <div style="width:5px; height:35px; border-radius:10px; background:${accent}; margin-right:15px;"></div>
                        <div>
                            <div style="font-weight:800; font-size:20px; letter-spacing:-0.5px;">${orario}</div>
                            <div style="font-size:11px; color:var(--text-secondary); font-weight:800; text-transform:uppercase;">${tipo}</div>
                        </div>
                    </div>
                    <input type="checkbox" class="ios-switch" ${attivo ? 'checked' : ''} onchange="sendToggle(${index})">
                </div>`);
        });
    }

    function toggleAllTimers() {
        allTimersActive = !allTimersActive;
        sendCmd(allTimersActive ? "ALL_ON" : "ALL_OFF");
        document.getElementById('conn-status-title').innerText = allTimersActive ? "Sistema Online" : "Timer Sospesi";
        document.getElementById('conn-status-title').style.color = allTimersActive ? "var(--text-primary)" : "var(--color-red)";
    }

    function sendCmd(c) { if(client.connected) client.publish('antizanzare/comandi', c); }
    function sendToggle(i) { if(client.connected) client.publish('antizanzare/comandi', 'TOGGLE_' + i); }
    
    function showTab(t, b) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.navbtn').forEach(x => x.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(b).classList.add('active');
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('time-now').innerText = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
